name: Pipeline DevSecOps

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pipeline:
    name: Build, Seguranca e Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Verificando arquivos..."
          ls src/
          echo "Build OK!"

      - name: Secrets Scanning - Gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest detect --source="/repo" --no-git --config="/repo/.gitleaks.toml" --report-format=sarif --report-path="/repo/gitleaks-report.sarif" --redact --verbose || true

      - name: Upload do relatorio do Gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          if-no-files-found: ignore

      - name: SAST - Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan --config auto --error src/

      - name: SCA - Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          /usr/local/bin/grype dir:. --fail-on medium

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload para Producao
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src'

      - name: Deploy em Producao
        id: deployment
        uses: actions/deploy-pages@v4
